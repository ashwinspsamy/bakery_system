<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APJ Bakery | Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #3e2723 0%, #5d3a1a 50%, #3e2723 100%);
            background-image: none;
        }

        .admin-login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .admin-login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: fadeInDown 0.6s ease-out;
        }

        .admin-login-brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .admin-login-brand .icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .admin-login-brand h1 {
            font-family: 'Playfair Display', serif;
            color: #d18d4f;
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }

        .admin-login-brand p {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.9rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .field-group label {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .field-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 0.9rem 1.2rem;
            color: white;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .field-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .field-group input:focus {
            border-color: #d18d4f;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(209, 141, 79, 0.25);
        }

        .btn-admin-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #d18d4f, #b5743b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(209, 141, 79, 0.4);
        }

        .btn-admin-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(209, 141, 79, 0.55);
        }

        .btn-admin-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(229, 107, 85, 0.2);
            border: 1px solid rgba(229, 107, 85, 0.5);
            color: #ff8a75;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            animation: shake 0.4s ease-out;
        }

        .error-msg.visible {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="admin-login-wrapper">
        <div class="admin-login-card">
            <div class="admin-login-brand">
                <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                    style="width: 60px; height: 60px; margin: 0 auto 1rem auto; display: block;">
                    <circle cx="50" cy="50" r="45" stroke="#DAA520" stroke-width="2" />
                    <path d="M30 65C30 50 40 40 50 40C60 40 70 50 70 65" stroke="#fff" stroke-width="4"
                        stroke-linecap="round" />
                    <path d="M40 75L50 65L60 75" stroke="#DAA520" stroke-width="3" stroke-linecap="round" />
                </svg>
                <h1>Admin Portal</h1>
                <p>APJ Bakery — Kitchen Management</p>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="field-group">
                    <label for="adminUser">Username</label>
                    <input type="text" id="adminUser" placeholder="Enter username" autocomplete="username" required>
                </div>
                <div class="field-group">
                    <label for="adminPass">Password</label>
                    <input type="password" id="adminPass" placeholder="Enter password" autocomplete="current-password"
                        required>
                </div>

                <div class="error-msg" id="errorMsg">
                    ❌ Invalid username or password. Please try again.
                </div>

                <button type="submit" class="btn-admin-login" id="loginBtn">🔐 Sign In to Dashboard</button>
            </form>

            <div class="back-link">
                <a href="index.html">← Back to Storefront</a>
            </div>
        </div>
    </div>

    <script>
        // Redirect if already logged in as admin
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin.html';
        }

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('adminUser').value.trim();
            const password = document.getElementById('adminPass').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            // Hardcoded admin credentials
            const ADMIN_USER = 'admin';
            const ADMIN_PASS = 'admin123';

            if (username === ADMIN_USER && password === ADMIN_PASS) {
                btn.textContent = '✅ Logging in...';
                btn.disabled = true;
                sessionStorage.setItem('adminLoggedIn', 'true');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
            } else {
                errorMsg.classList.add('visible');
                document.getElementById('adminPass').value = '';
                document.getElementById('adminPass').focus();
                setTimeout(() => errorMsg.classList.remove('visible'), 4000);
            }
        }
    </script>
</body>

</html>
